front:
  text: 終南八祖説心印妙經解終南八祖說心印妙經解
  hash: sha256:87e05a92a2f16c48d888cd3f1ca8fab609e59697a97306bb7f331a144e925c75
  markers:
  - {type: page-break, offset: 10, content: '', id: CK-KZ_KR5i0018_01p016a}
body:
  text: 爾時東華帝君正陽仙主道極天尊孚佑上帝普鍊祖師光垣尊仙妙法元君瑶華仙子在道禪境下寶覺壇中蓮花錯落白鶴繽紛有修玄諸弟子望空稽首誓願修行於是諸天尊降蓮臺而說心印經曰人生天地萬物之靈惟心印道惟道印心印無所印心無所心心印於事厥體必紛心印於物厥體必淫於無印印於無心心心從無宅印從無精一靈不昧善果臻身夫人有心而自失之人能印而自棄之失非其失則可有心棄其所棄則可能印若善男子信女人日持此經卽知其心旣知其心卽知其印旣知其印卽知非心有心旣知非心卽知有印非印印不印印心無心心眞神眞氣合我眞精一元三品是印是心斂情斂意忘見忘聞靑龍攪海白虎歸林坎離成象日月分明子午火起卯酉爐停三年乳哺一紀飛昇如此眞道名得眞心眞心一得七竅皆靈惟靈則靜敬爲靜根主敬守一自然印心印心心印妙哉眞經諸天尊說經已畢修玄弟子各各踴躍歡喜稽首謝恩於是天尊齊齊拱手而說偈曰混沌乾坤一氣分眞精妙合産蒼生性中有性歸原性心外無心去妄心若得道時勤鍊度倘離經處自紛更我今普勸修玄士立志修玄玄便眞
  hash: sha256:b5c5d3dea538895b7ff456e9ec22d1010cae35118eda6bb4f6ec8f372ed34242
